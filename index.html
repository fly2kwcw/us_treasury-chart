<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Treasury Yield Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid;
        }
        .stat-section.y10 {
            border-left-color: #1f77b4;
        }
        .stat-section.y30 {
            border-left-color: #ff7f0e;
        }
        .stat-section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .stat-label {
            color: #666;
        }
        .stat-value {
            font-weight: 600;
            color: #333;
        }
        .current-highlight {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        /* 利差显示 */
        .spread-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }
        .spread-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .spread-value {
            font-size: 36px;
            font-weight: bold;
        }
        .spread-label {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        /* 图表 */
        #chart {
            width: 100%;
            height: 500px;
        }
        
        /* 底部信息 */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 12px;
        }
        .auto-update {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🇺🇸 美国国债收益率对比</h1>
            <p class="subtitle">10年期 vs 30年期 | 过去60天走势对比</p>
            
            <!-- 利差卡片 -->
            <div class="spread-card">
                <div class="spread-title">期限利差 (30Y - 10Y)</div>
                <div class="spread-value" id="spread-value">--</div>
                <div class="spread-label">收益率曲线陡峭程度</div>
            </div>
            
            <!-- 统计数据 -->
            <div class="stats-grid">
                <!-- 10年期 -->
                <div class="stat-section y10">
                    <div class="stat-section-title">📊 10年期美债</div>
                    <div class="stat-row">
                        <span class="stat-label">当前</span>
                        <span class="stat-value current-highlight" id="y10-current">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">60天最高</span>
                        <span class="stat-value" id="y10-high">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">60天最低</span>
                        <span class="stat-value" id="y10-low">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">平均值</span>
                        <span class="stat-value" id="y10-avg">--</span>
                    </div>
                </div>
                
                <!-- 30年期 -->
                <div class="stat-section y30">
                    <div class="stat-section-title">📈 30年期美债</div>
                    <div class="stat-row">
                        <span class="stat-label">当前</span>
                        <span class="stat-value current-highlight" id="y30-current">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">60天最高</span>
                        <span class="stat-value" id="y30-high">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">60天最低</span>
                        <span class="stat-value" id="y30-low">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">平均值</span>
                        <span class="stat-value" id="y30-avg">--</span>
                    </div>
                </div>
            </div>
            
            <!-- 图表 -->
            <div id="chart"></div>
            
            <!-- 底部 -->
            <div class="footer">
                <div>数据范围: <span id="date-range">--</span></div>
                <div class="auto-update">
                    <span class="status-dot"></span>
                    <span>自动更新开启 (每小时)</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartData = {};
        
        // 内置数据
        const fallbackData = {
            '10y': {
                dates: ['2025-12-26','2025-12-29','2025-12-30','2025-12-31','2026-01-02','2026-01-05','2026-01-06','2026-01-07','2026-01-08','2026-01-09','2026-01-12','2026-01-13','2026-01-14','2026-01-15','2026-01-16','2026-01-20','2026-01-21','2026-01-22','2026-01-23','2026-01-26','2026-01-27','2026-01-28','2026-01-29','2026-01-30','2026-02-02','2026-02-03','2026-02-04','2026-02-05','2026-02-06','2026-02-09','2026-02-10','2026-02-11','2026-02-12','2026-02-13','2026-02-17','2026-02-18','2026-02-19','2026-02-20','2026-02-23','2026-02-24','2026-02-25','2026-02-26','2026-02-27','2026-03-02','2026-03-03','2026-03-04','2026-03-05','2026-03-06'],
                yields: [4.59,4.58,4.56,4.57,4.62,4.68,4.69,4.67,4.71,4.77,4.81,4.83,4.78,4.80,4.82,4.86,4.83,4.80,4.78,4.75,4.77,4.79,4.79,4.80,4.81,4.81,4.80,4.73,4.73,4.74,4.66,4.68,4.56,4.53,4.50,4.54,4.53,4.55,4.52,4.52,4.53,4.50,4.47,4.53,4.54,4.57,4.60,4.62]
            },
            '30y': {
                dates: ['2025-12-26','2025-12-29','2025-12-30','2025-12-31','2026-01-02','2026-01-05','2026-01-06','2026-01-07','2026-01-08','2026-01-09','2026-01-12','2026-01-13','2026-01-14','2026-01-15','2026-01-16','2026-01-20','2026-01-21','2026-01-22','2026-01-23','2026-01-26','2026-01-27','2026-01-28','2026-01-29','2026-01-30','2026-02-02','2026-02-03','2026-02-04','2026-02-05','2026-02-06','2026-02-09','2026-02-10','2026-02-11','2026-02-12','2026-02-13','2026-02-17','2026-02-18','2026-02-19','2026-02-20','2026-02-23','2026-02-24','2026-02-25','2026-02-26','2026-02-27','2026-03-02','2026-03-03','2026-03-04','2026-03-05','2026-03-06'],
                yields: [4.81,4.80,4.81,4.84,4.86,4.85,4.86,4.82,4.85,4.82,4.83,4.83,4.79,4.79,4.83,4.91,4.87,4.84,4.82,4.80,4.83,4.85,4.85,4.87,4.90,4.90,4.91,4.85,4.85,4.85,4.78,4.82,4.72,4.69,4.68,4.71,4.70,4.72,4.70,4.70,4.70,4.67,4.64,4.70,4.70,4.72,4.74,4.77]
            }
        };
        
        // 计算均线
        function calculateMA(data, period) {
            const ma = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    ma.push(null);
                } else {
                    let sum = 0;
                    for (let j = 0; j < period; j++) {
                        sum += data[i - j];
                    }
                    ma.push(parseFloat((sum / period).toFixed(2)));
                }
            }
            return ma;
        }
        
        // 更新统计数据
        function updateStats() {
            const y10 = chartData['10y'].yields;
            const y30 = chartData['30y'].yields;
            
            // 过滤掉 null 值
            const y10_valid = y10.filter(v => v !== null);
            const y30_valid = y30.filter(v => v !== null);
            
            // 获取最后一个有效值
            const y10_current = y10_valid[y10_valid.length - 1];
            const y30_current = y30_valid[y30_valid.length - 1];
            
            // 10年期统计
            document.getElementById('y10-current').textContent = y10_current.toFixed(2) + '%';
            document.getElementById('y10-high').textContent = Math.max(...y10_valid).toFixed(2) + '%';
            document.getElementById('y10-low').textContent = Math.min(...y10_valid).toFixed(2) + '%';
            document.getElementById('y10-avg').textContent = (y10_valid.reduce((a, b) => a + b, 0) / y10_valid.length).toFixed(2) + '%';
            
            // 30年期统计
            document.getElementById('y30-current').textContent = y30_current.toFixed(2) + '%';
            document.getElementById('y30-high').textContent = Math.max(...y30_valid).toFixed(2) + '%';
            document.getElementById('y30-low').textContent = Math.min(...y30_valid).toFixed(2) + '%';
            document.getElementById('y30-avg').textContent = (y30_valid.reduce((a, b) => a + b, 0) / y30_valid.length).toFixed(2) + '%';
            
            // 利差
            const spread = y30_current - y10_current;
            document.getElementById('spread-value').textContent = spread.toFixed(2) + '%';
        }
        
        // 绘制图表（双线图对比）
        function drawChart() {
            const dates = chartData['10y'].dates;
            const y10 = chartData['10y'].yields;
            const y30 = chartData['30y'].yields;
            
            const ma10_5 = calculateMA(y10, 5);
            const ma30_5 = calculateMA(y30, 5);
            
            // 10年期主线
            const trace10 = {
                x: dates,
                y: y10,
                mode: 'lines',
                name: '10年期美债',
                line: { color: '#1f77b4', width: 3 },
                hovertemplate: '10年期: %{y:.2f}%<extra></extra>'
            };
            
            // 10年期均线
            const trace10_ma = {
                x: dates,
                y: ma10_5,
                mode: 'lines',
                name: '10Y MA5',
                line: { color: '#1f77b4', width: 1, dash: 'dot' },
                opacity: 0.6,
                hovertemplate: '10Y MA5: %{y:.2f}%<extra></extra>'
            };
            
            // 30年期主线
            const trace30 = {
                x: dates,
                y: y30,
                mode: 'lines',
                name: '30年期美债',
                line: { color: '#ff7f0e', width: 3 },
                hovertemplate: '30年期: %{y:.2f}%<extra></extra>'
            };
            
            // 30年期均线
            const trace30_ma = {
                x: dates,
                y: ma30_5,
                mode: 'lines',
                name: '30Y MA5',
                line: { color: '#ff7f0e', width: 1, dash: 'dot' },
                opacity: 0.6,
                hovertemplate: '30Y MA5: %{y:.2f}%<extra></extra>'
            };
            
            // 最新值标注 - 10年
            const latest10 = {
                x: [dates[dates.length - 1]],
                y: [y10[y10.length - 1]],
                mode: 'markers+text',
                name: '10Y当前',
                text: [y10[y10.length - 1].toFixed(2) + '%'],
                textposition: 'top left',
                marker: { size: 10, color: '#1f77b4' },
                textfont: { size: 12, color: '#1f77b4', weight: 'bold' },
                showlegend: false,
                hoverinfo: 'skip'
            };
            
            // 最新值标注 - 30年
            const latest30 = {
                x: [dates[dates.length - 1]],
                y: [y30[y30.length - 1]],
                mode: 'markers+text',
                name: '30Y当前',
                text: [y30[y30.length - 1].toFixed(2) + '%'],
                textposition: 'top right',
                marker: { size: 10, color: '#ff7f0e' },
                textfont: { size: 12, color: '#ff7f0e', weight: 'bold' },
                showlegend: false,
                hoverinfo: 'skip'
            };
            
            const plotData = [trace10, trace10_ma, trace30, trace30_ma, latest10, latest30];
            
            const layout = {
                title: {
                    text: '10年期 vs 30年期美债收益率对比',
                    font: { size: 18 }
                },
                xaxis: {
                    title: '',
                    tickangle: -45,
                    tickmode: 'array',
                    tickvals: dates.filter((_, i) => i % 5 === 0),
                    ticktext: dates.filter((_, i) => i % 5 === 0).map(d => d.slice(5))
                },
                yaxis: {
                    title: '收益率 (%)',
                    tickformat: '.2f'
                },
                hovermode: 'x unified',
                legend: {
                    orientation: 'h',
                    y: 1.15,
                    x: 0.5,
                    xanchor: 'center'
                },
                margin: { t: 80, b: 80 },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)'
            };
            
            const config = {
                responsive: true,
                displayModeBar: true,
                displaylogo: false
            };
            
            Plotly.newPlot('chart', plotData, layout, config);
            
            // 更新日期范围
            document.getElementById('date-range').textContent = 
                `${dates[0]} ~ ${dates[dates.length - 1]}`;
        }
        
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data.json?t=' + Date.now());
                if (response.ok) {
                    chartData = await response.json();
                    console.log('从 data.json 加载数据成功');
                } else {
                    throw new Error('无法加载 data.json');
                }
            } catch (e) {
                console.log('使用内置数据');
                chartData = fallbackData;
            }
            
            updateStats();
            drawChart();
        }
        
        // 自动更新
        function autoUpdate() {
            console.log('检查数据更新...');
            loadData();
        }
        
        // 初始化
        window.addEventListener('load', () => {
            loadData();
            setInterval(autoUpdate, 60 * 60 * 1000);
        });
        
        window.addEventListener('resize', () => {
            if (document.getElementById('chart').data) {
                Plotly.Plots.resize(document.getElementById('chart'));
            }
        });
    </script>
</body>
</html>
